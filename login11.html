<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Keya Tung Beauty Parlour</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', Times, serif;
      background: linear-gradient(to right, #f8bbd0, #b2ebf2);
      background-image: url('https://en.idei.club/uploads/posts/2023-06/1687399560_en-idei-club-p-blur-background-image-dizain-pinterest-2.jpg');background-position: center; background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #444;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #f48fb1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }

    button:hover {
      background-color: #ec407a;
    }

    .error {
      color: red;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <div class="error" id="errorMessage">Invalid credentials. Try again.</div>
      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMessage");

    loginForm.addEventListener("submit", function(e) {
      e.preventDefault();

      const inputUser = document.getElementById("username").value.trim();
      const inputPass = document.getElementById("password").value.trim();
      const storedUser = JSON.parse(localStorage.getItem("user"));

      if (storedUser && inputUser === storedUser.username && inputPass === storedUser.password) {
        window.location.href = "homepage11.html";
      } else {
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
