<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Keya Tung Beauty Parlour</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', Times, serif;
      background: linear-gradient(to right, #f8bbd0, #b2ebf2);
      background-image: url('https://en.idei.club/uploads/posts/2023-06/1687399560_en-idei-club-p-blur-background-image-dizain-pinterest-2.jpg');background-position: center;background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .form-box {
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #444;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #f48fb1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }

    button:hover {
      background-color: #ec407a;
    }

    .message {
      text-align: center;
      margin-top: 10px;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }

    .error {
      color: red;
      font-family: Georgia, 'Times New Roman', Times, serif;
      display: none;
    }

    .success {
      color: green;
      font-family: Georgia, 'Times New Roman', Times, serif;
      display: none;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Create Account</h2>
    <form id="registerForm">
      <input type="text" id="fullName" placeholder="Full Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="text" id="phone" placeholder="Phone Number" maxlength="10" required />
      <input type="text" id="username" placeholder="Create Username" required />
      <input type="password" id="password" placeholder="Create Password" required />
      <button type="submit">Register</button>
      <div class="message">
        <p class="error" id="errorMessage"></p>
        <p class="success" id="successMessage">Registration successful! Redirecting to login...</p>
      </div>
    </form>
  </div>

  <script>
    const regForm = document.getElementById("registerForm");
    const errorMsg = document.getElementById("errorMessage");
    const successMsg = document.getElementById("successMessage");

    regForm.addEventListener("submit", function(e) {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      errorMsg.style.display = "none";
      successMsg.style.display = "none";

      // Phone number validation
      const phoneRegex = /^[0-9]{10}$/;
      const fourZeroRegex = /0000/;

      if (!phoneRegex.test(phone)) {
        errorMsg.textContent = "Phone number must be exactly 10 digits.";
        errorMsg.style.display = "block";
        return;
      }

      if (fourZeroRegex.test(phone)) {
        errorMsg.textContent = "Invalid phone number: four 0s in a row not allowed.";
        errorMsg.style.display = "block";
        return;
      }

      // Save user
      const user = { fullName, email, phone, username, password };
      localStorage.setItem("user", JSON.stringify(user));

      successMsg.style.display = "block";
      setTimeout(() => {
        window.location.href = "login11.html";
      }, 1500);
    });
  </script>
</body>
</html>
