<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Math Expression Evaluator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f9;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Math Expression Evaluator</h2>
    <form id="mathForm">
      <input type="text" id="expression" placeholder="Enter expression e.g. 5+3*2/4" required>
      <button type="submit">Evaluate</button>
    </form>
    <div class="result" id="result"></div>
  </div>

  <script>
    document.getElementById("mathForm").addEventListener("submit", function(e) {
      e.preventDefault(); // Prevent form submission

      const expr = document.getElementById("expression").value;
      const resultDiv = document.getElementById("result");

      try {
        // Allow only numbers and math operators for safety
        if (!/^[0-9+\-*/().\s]+$/.test(expr)) {
          throw new Error("Invalid characters in expression!");
        }

        // Evaluate the expression
        const result = Function('"use strict"; return (' + expr + ')')();
        
        resultDiv.textContent = "Result: " + result;
      } catch (error) {
        resultDiv.textContent = "Error: " + error.message;
      }
    });
  </script>
</body>
</html>
